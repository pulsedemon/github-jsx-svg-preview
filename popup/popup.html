<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #1f2328;
      background: #ffffff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #d1d9e0;
    }

    .header svg {
      flex-shrink: 0;
      color: #8957e5;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #d1d9e0;
    }

    .section:last-child {
      border-bottom: none;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .row + .row {
      margin-top: 10px;
    }

    .label {
      font-size: 13px;
      color: #1f2328;
    }

    .sublabel {
      font-size: 11px;
      color: #656d76;
      margin-top: 2px;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #d1d9e0;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #8957e5;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }

    .stats {
      padding: 12px 16px;
      text-align: center;
      color: #656d76;
      font-size: 12px;
    }

    .stats .count {
      font-size: 20px;
      font-weight: 600;
      color: #8957e5;
      display: block;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    <h1>JSX SVG Preview</h1>
  </div>

  <div class="section">
    <div class="row">
      <div>
        <div class="label">Enable previews</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="enabled" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <div>
        <div class="label">Auto-preview</div>
        <div class="sublabel">Show previews without clicking</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="autoPreview">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="stats">
    <span class="count" id="svgCount">--</span>
    SVGs detected on this page
  </div>

  <script src="popup.js"></script>
</body>
</html>
